<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Clark AI — Preview</title>
<meta name="robots" content="noindex">
<meta name="description" content="A preview of conversational Clark AI for Tea For Streets — simulated, for testing.">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box}
body{margin:0;background:#EFE7D6;color:#19222E;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;-webkit-font-smoothing:antialiased}
.wrap{max-width:460px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;padding:14px 14px 10px}
.banner{font-size:12.5px;color:#8a7a54;text-align:center;padding:6px 8px 12px;line-height:1.5}
.banner a{color:#b9912f;text-decoration:none}
.card{background:#FBF7EE;border:1px solid #E7DEC9;border-radius:22px;box-shadow:0 10px 30px rgba(20,26,38,.10);overflow:hidden;display:flex;flex-direction:column;flex:1;min-height:0}
.head{display:flex;align-items:center;gap:11px;padding:14px 16px;background:#15202E;color:#fff}
.av{width:42px;height:42px;border-radius:50%;background:#F3ECDB;display:flex;align-items:center;justify-content:center;overflow:hidden;flex:none}
.av img{width:38px;height:38px;object-fit:contain}
.av.pulse{animation:avp .5s ease}
@keyframes avp{0%{transform:scale(1)}45%{transform:scale(1.1)}100%{transform:scale(1)}}
.nm{font-family:"Fraunces",Georgia,serif;font-weight:500;font-size:17px;line-height:1.15}
.sb{font-size:12px;color:#a9b4c4;margin-top:1px}
.tag{margin-left:auto;font-size:11px;letter-spacing:.04em;text-transform:uppercase;color:#e7c877;border:1px solid #6b6038;padding:3px 8px;border-radius:999px}
.thread{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:11px;background:#FBF7EE;scroll-behavior:smooth}
.b{max-width:86%;padding:11px 14px;border-radius:18px;font-size:15px;line-height:1.55;animation:rise .28s ease both}
@keyframes rise{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:none}}
.bot{align-self:flex-start;background:#fff;border:1px solid #ECE3CF;color:#1a232f;border-bottom-left-radius:6px}
.usr{align-self:flex-end;background:#15202E;color:#F3ECDB;border-bottom-right-radius:6px}
.b b{font-weight:600}
.cch{display:flex;flex-wrap:wrap;gap:6px;margin-top:9px}
.src{display:inline-flex;align-items:center;gap:5px;font-size:12px;padding:3px 9px;border-radius:999px;background:#EAF1E4;color:#3b6d11}
.lbl{font-size:12px;color:#8a8270;align-self:center}
.pill{font-size:12px;padding:3px 10px;border-radius:999px;display:inline-flex;align-items:center;gap:5px}
.pgood{background:#EAF1E4;color:#3b6d11}
.pamber{background:#FBEFD6;color:#8a5a0b}
.det{cursor:pointer;color:#8a7a54;font-size:12.5px;margin-top:9px;display:inline-block;user-select:none}
.detb{display:none;margin-top:7px;font-size:13px;color:#5f5a4e;background:#F4EEDD;border-radius:10px;padding:9px 12px;line-height:1.6}
.detb.open{display:block}
.cf{margin-top:10px;font-size:13px;color:#7a6f54}
.muted{color:#b0a48a}
.ok{display:inline-block;color:#3b6d11;font-weight:600;animation:pop .45s ease}
@keyframes pop{0%{transform:scale(.4);opacity:0}60%{transform:scale(1.25)}100%{transform:scale(1);opacity:1}}
.sug{display:flex;flex-wrap:wrap;gap:7px;padding:0 16px 12px;background:#FBF7EE}
.chip{font-size:13px;padding:7px 12px;border-radius:999px;border:1px solid #E2D8C0;background:#fff;color:#54607a;cursor:pointer;text-align:left;line-height:1.35;transition:border-color .15s}
.chip:hover{border-color:#cbbf9f}
.chip:active{transform:scale(.97)}
.row{display:flex;gap:9px;align-items:center;padding:12px 14px;border-top:1px solid #EFE6D2;background:#FBF7EE}
.row input{flex:1;border:1px solid #E2D8C0;background:#fff;border-radius:999px;padding:11px 15px;font-size:15px;color:#19222E;outline:none}
.row input:focus{border-color:#b9912f}
.sendb{width:42px;height:42px;flex:none;border:none;border-radius:50%;background:#15202E;color:#F3ECDB;font-size:19px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .12s}
.sendb:active{transform:scale(.92)}
.ty i{display:inline-block;width:6px;height:6px;border-radius:50%;background:#b9a98a;margin-right:3px;animation:cab 1s infinite}
@keyframes cab{0%,80%,100%{opacity:.3}40%{opacity:.9}}
.foot{font-size:11.5px;color:#a2926e;text-align:center;padding:10px 8px 4px}
@media(max-width:480px){.wrap{padding:8px 8px 6px}.card{border-radius:18px}}
</style>
</head>

 var J={la:{name:'Los Angeles',sys:'MyLA311'},sf:{name:'San Francisco',sys:'SF311'}};
 var R={
  'Pothole':{la:{d:'StreetsLA — Bureau of Street Services',sn:'Pothole / Roadway Repair',st:['Caltrans Standard Specifications (2023)','Greenbook (2024)']},sf:{d:'San Francisco Public Works',sn:'Street Defect / Pothole',st:['Caltrans Standard Specifications (2023)','SF Public Works Standards']}},
  'Graffiti':{la:{d:'Office of Community Beautification',sn:'Graffiti Removal',st:['LA Municipal Code §49.84']},sf:{d:'San Francisco Public Works',sn:'Graffiti',st:['SF Public Works graffiti policy']}},
  'Trash / dumping':{la:{d:'LA Sanitation (LASAN)',sn:'Illegal Dumping / Bulky-Item',st:['LASAN illegal-dumping program']},sf:{d:'San Francisco Public Works',sn:'Street / Sidewalk Cleaning',st:['SF Public Works Standards']}},
  'Broken streetlight':{la:{d:'Bureau of Street Lighting',sn:'Street Light Issue',st:['LA Bureau of Street Lighting Design Standards','Greenbook (2024)']},sf:{d:'SFPUC / PG&E',sn:'Streetlight Repair',st:['SF Public Works Standards']}},
  'Blocked sidewalk':{la:{d:'StreetsLA — Sidewalk',sn:'Sidewalk Repair / Obstruction',st:['PROWAG (2023)','Greenbook (2024)']},sf:{d:'San Francisco Public Works',sn:'Sidewalk',st:['PROWAG (2023)','SF Street & Sidewalk Maintenance Standards']}}
 };
 var NOUN={'Pothole':'pothole','Graffiti':'graffiti','Trash / dumping':'dumping','Broken streetlight':'streetlight','Blocked sidewalk':'sidewalk'};
 var KW=[['Pothole',['pothole','hole','road','asphalt','crater','tire']],['Graffiti',['graffiti','tag','spray','vandal','paint']],['Trash / dumping',['trash','dump','couch','mattress','garbage','litter','furniture','junk','pile']],['Broken streetlight',['streetlight','street light','light','lamp','dark','bulb','flicker']],['Blocked sidewalk',['sidewalk','curb','trip','wheelchair','walkway']]];
 var OTHER=['chicago','new york','nyc','brooklyn','queens','houston','phoenix','philadelphia','san antonio','san diego','dallas','austin','seattle','denver','boston','portland','oakland','sacramento','san jose','long beach','miami','atlanta','las vegas','detroit','nashville'];
 var ctx={awaiting:null,issue:null};
 function esc(s){return s.replace(/[&<>]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;'}[c];});}
 function pick(a){return a[Math.floor(Math.random()*a.length)];}
 function scd(){thread.scrollTop=thread.scrollHeight;}
 function pulse(){avatar.classList.remove('pulse');void avatar.offsetWidth;avatar.classList.add('pulse');}
 function bub(cls,html){var d=document.createElement('div');d.className='b '+cls;d.innerHTML=html;thread.appendChild(d);if(cls.indexOf('bot')>=0)pulse();scd();return d;}
 function usr(t){bub('usr',esc(t));}
 function ty(cb){var d=document.createElement('div');d.className='b bot ty';d.innerHTML='<i></i><i></i><i></i>';thread.appendChild(d);scd();setTimeout(function(){d.remove();cb();},760);}
 function dCat(t){t=' '+t.toLowerCase()+' ';for(var i=0;i<KW.length;i++){for(var k=0;k<KW[i][1].length;k++){if(t.indexOf(KW[i][1][k])>=0)return KW[i][0];}}return null;}
 function dJur(t){t=' '+t.toLowerCase()+' ';if(/(los angeles|l\.a\.| la |hollywood|venice|van nuys|sylmar)/.test(t))return 'la';if(/(san francisco|s\.f\.| sf |mission|soma|tenderloin|sunset)/.test(t))return 'sf';return null;}
 function otherCity(t){t=' '+t.toLowerCase()+' ';for(var i=0;i<OTHER.length;i++){if(t.indexOf(' '+OTHER[i]+' ')>=0||t.indexOf(' '+OTHER[i]+',')>=0)return OTHER[i].replace(/\b\w/g,function(c){return c.toUpperCase();});}return null;}
 function urg(t){return /(huge|big|deep|dangerous|tire|popped|week|month|kid|school|elderly|wheelchair|blind|hazard|injur)/i.test(t);}
 function frus(t){return /(year|years|forever|nobody|never|still|again|months|ridiculous|sick of|tired of|fed up|come on|seriously)/i.test(t);}
 function mirror(t){var m=t.match(/\b(near|by|on|at|next to|in front of|outside|down)\s+([A-Za-z0-9'’\.\- ]{2,40})/i);if(!m)return '';var p=(m[1]+' '+m[2]).trim().replace(/[,.;:]+$/,'');p=p.replace(/\s+(in\s+)?(los angeles|san francisco|\bla\b|\bsf\b)\b.*$/i,'').trim();if(p.length<4||/^(on|by|at|near|down|next to|outside)$/i.test(p))return '';return ' '+p;}
 function lead(t){if(frus(t))return pick(['Years of this with no fix — let’s actually move it. ','Too long for one block to carry. On it. ','I hear you — let’s get this off your plate. ']);if(urg(t))return pick(['That’s a hazard — I’m bumping it up. ','That one’s dangerous — priority. ']);return '';}
 function chips(arr){var h='<div class="cch"><span class="lbl">Grounded in</span>';arr.forEach(function(x){h+='<span class="src">&#10003; '+esc(x)+'</span>';});return h+'</div>';}
 function detb(r,sys){return '<div class="det" data-det>The details &#9662;</div><div class="detb">Filed as <b>'+esc(r.sn)+'</b> &middot; routed through '+esc(sys)+' &middot; held to: '+esc(r.st.join(', '))+'.</div>';}
 function wireDet(d){var t=d.querySelector('[data-det]');if(!t)return;t.onclick=function(){var b=d.querySelector('.detb');if(b){var open=b.classList.toggle('open');t.innerHTML=open?'The details &#9652;':'The details &#9662;';scd();}};}
 function grounded(c,jk,t){
  var r=R[c][jk],jn=J[jk].name,sys=J[jk].sys,noun=NOUN[c]||c.toLowerCase(),mir=mirror(t);
  var routeV=pick([
   'The right desk is <b>'+esc(r.d)+'</b> ('+sys+'), and there’s an official city standard for this fix — I’ll hold them to it.',
   'I’ll route it to <b>'+esc(r.d)+'</b> through '+sys+', and hold them to the city’s standard for it.',
   '<b>'+esc(r.d)+'</b> owns this one (via '+sys+') — there’s a real repair standard, and I’ll keep them to it.'
  ]);
  var d=bub('bot',lead(t)+'Got it — the <b>'+esc(noun)+'</b>'+(mir?esc(mir):'')+' in '+esc(jn)+'. '+routeV+chips(r.st)+'<div class="cch"><span class="pill pgood">&#10003; high confidence</span></div>'+detb(r,sys));
  wireDet(d);
  var ac=document.createElement('div');ac.className='cch';ac.style.alignSelf='flex-start';
  ac.innerHTML='<button class="chip" data-a="send">Send it</button><button class="chip" data-a="photo">Add a photo</button>';
  thread.appendChild(ac);scd();
  Array.prototype.forEach.call(ac.querySelectorAll('button'),function(b){b.onclick=function(){var a=b.getAttribute('data-a');ac.remove();if(a==='send'){usr('Send it');ty(function(){var ref='TFS-'+(1000+Math.floor(Math.random()*9000));var n=2+Math.floor(Math.random()*3);try{if(navigator.vibrate)navigator.vibrate([8,40,8]);}catch(e){}bub('bot','<span class="ok">&#10003;</span> <b>Done.</b> You just put this on the city’s radar — it’s with '+esc(r.d)+' now (ref '+ref+'). I’ll email you at each step: filed &rarr; acknowledged &rarr; fixed — no chasing on your end.<div class="cf">You’re the <b>'+n+(n===2?'nd':'rd')+'</b> neighbor to flag this block this month. <span class="muted">(illustrative)</span></div>');});}else{usr('Add a photo');ty(function(){bub('bot','A photo helps the city act faster — and it carries the exact spot. Attached. Want me to send it now?');});}};});
  ctx={awaiting:null,issue:null};
 }
 function review(){bub('bot','I want this on the right desk, so I won’t guess. Tell me a bit more — what are you seeing, and roughly where? <span class="pill pamber">needs a human look</span>');}
 function respond(t){
  if(ctx.awaiting==='location'){
   var jk=dJur(t);if(jk){grounded(ctx.issue,jk,t);return;}
   var oc=otherCity(t);if(oc){bub('bot','Ah — '+esc(oc)+' is outside LA and San Francisco, and those are the only city crews I can reach so far. I’ll note it for when we expand. Anything in LA or SF I can take right now?');ctx={awaiting:null,issue:null};return;}
   bub('bot','I can only reach <b>LA</b> and <b>San Francisco</b> city crews right now — is it in one of those (or a nearby cross-street)?');return;
  }
  var c=dCat(t);
  if(!c){if(frus(t)){bub('bot',pick(['I hear you — years of this with no fix is exactly what Clark’s here to break. What’s the actual issue — pothole, light, sidewalk, dumping — and roughly where?','That’s too long for a block to wait. Tell me what it is — pothole, light, sidewalk, dumping — and where, and I’ll move it.']));}else{review();}return;}
  var j=dJur(t);if(j){grounded(c,j,t);return;}
  var oc2=otherCity(t);if(oc2){bub('bot','Got it on the '+esc(NOUN[c]||c.toLowerCase())+' — but '+esc(oc2)+' is outside LA and San Francisco, the only crews I can reach so far. Want me to note it for when we expand?');ctx={awaiting:null,issue:null};return;}
  ctx={awaiting:'location',issue:c};
  bub('bot','Got it — sounds like a <b>'+esc(NOUN[c]||c.toLowerCase())+'</b>'+esc(mirror(t))+'. Clark covers <b>Los Angeles</b> and <b>San Francisco</b> so far — which one is it (or the nearest cross-street)?');
 }
 function send(t){t=(t||input.value).trim();if(!t)return;input.value='';sug.style.display='none';usr(t);ty(function(){respond(t);});}
 sendBtn.onclick=function(){send();};
 input.addEventListener('keydown',function(e){if(e.key==='Enter')send();});
 bub('bot','Hey — I’m <b>Clark</b>. Tell me what’s going on with your street, in your own words, and I’ll work out who fixes it and how.');
 ['There’s a deep pothole on Main near the school in LA','Someone dumped a couch on my block in San Francisco','This corner’s been broken for two years and nobody helps'].forEach(function(x){var b=document.createElement('button');b.className='chip';b.textContent=x;b.onclick=function(){send(b.textContent);};sug.appendChild(b);});
})();
</script>
</body>
</html>
